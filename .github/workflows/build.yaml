name: Check and Build
on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
  release:
    types: [released]
permissions: read-all
jobs:
  lint:
    name: Lint codebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.11
          cache: "pip"
      - name: Run lint
        run: make lint
  test:
    name: Test with python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"
      - name: Run tests
        run: |
          set -e
          git config --global user.name "Github Runner"
          make test
  build-wheel:
    name: Build wheel with python ${{ matrix.python }}-${{ matrix.arch}}-${{ matrix.libc }}
    needs: [lint, test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        arch:
          - x86_64
          - i686
          - ppc64le
          - aarch64
          - armv7l
        libc:
          - glibc
          - musl
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - name: Building package
        run: ./wheel.sh
        env:
          python: ${{ matrix.python }}
          arch: ${{ matrix.arch }}
          libc: ${{ matrix.libc }}
      - uses: actions/upload-artifact@v6
        with:
          name: pip-wheel-${{ matrix.python }}-${{ matrix.arch }}-${{ matrix.libc }}
          path: wheelhouse/*
          if-no-files-found: error
  build-sdist:
    name: Build sdist
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          key: sdist-${{ matrix.python }}-${{ hashFiles('pyproject.toml') }}
      - name: Install build tool
        run: pip install build
      - name: Building package
        run: make sdist
      - uses: actions/upload-artifact@v6
        with:
          name: pip-sdist
          path: dist/*
          if-no-files-found: error
  publish:
    name: Publish to PyPi
    if: github.repository == 'Eeems/git-remote-rns' && github.event_name == 'release' && startsWith(github.ref, 'refs/tags')
    needs:
      - build-sdist
      - build-wheel
    runs-on: ubuntu-latest
    strategy:
      matrix:
        artifact:
          - "pip-sdist"
          - "pip-wheel-3.11-x86_64-glibc"
          - "pip-wheel-3.12-x86_64-glibc"
          - "pip-wheel-3.13-x86_64-glibc"
          - "pip-wheel-3.14-x86_64-glibc"
          - "pip-wheel-3.11-i686-glibc"
          - "pip-wheel-3.12-i686-glibc"
          - "pip-wheel-3.13-i686-glibc"
          - "pip-wheel-3.14-i686-glibc"
          - "pip-wheel-3.11-ppc64le-glibc"
          - "pip-wheel-3.12-ppc64le-glibc"
          - "pip-wheel-3.13-ppc64le-glibc"
          - "pip-wheel-3.14-ppc64le-glibc"
          - "pip-wheel-3.11-aarch64-glibc"
          - "pip-wheel-3.12-aarch64-glibc"
          - "pip-wheel-3.13-aarch64-glibc"
          - "pip-wheel-3.14-aarch64-glibc"
          - "pip-wheel-3.11-armv7l-glibc"
          - "pip-wheel-3.12-armv7l-glibc"
          - "pip-wheel-3.13-armv7l-glibc"
          - "pip-wheel-3.14-armv7l-glibc"
          - "pip-wheel-3.11-x86_64-musl"
          - "pip-wheel-3.12-x86_64-musl"
          - "pip-wheel-3.13-x86_64-musl"
          - "pip-wheel-3.14-x86_64-musl"
          - "pip-wheel-3.11-i686-musl"
          - "pip-wheel-3.12-i686-musl"
          - "pip-wheel-3.13-i686-musl"
          - "pip-wheel-3.14-i686-musl"
          - "pip-wheel-3.11-ppc64le-musl"
          - "pip-wheel-3.12-ppc64le-musl"
          - "pip-wheel-3.13-ppc64le-musl"
          - "pip-wheel-3.14-ppc64le-musl"
          - "pip-wheel-3.11-aarch64-musl"
          - "pip-wheel-3.12-aarch64-musl"
          - "pip-wheel-3.13-aarch64-musl"
          - "pip-wheel-3.14-aarch64-musl"
          - "pip-wheel-3.11-armv7l-musl"
          - "pip-wheel-3.12-armv7l-musl"
          - "pip-wheel-3.13-armv7l-musl"
          - "pip-wheel-3.14-armv7l-musl"
    permissions:
      id-token: write
      contents: write
    environment:
      name: pypi
      url: https://pypi.org/p/git-remote-rns
    steps:
      - name: Download pip packages
        id: download
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ steps.download.outputs.download-path }}
          skip-existing: true
  release:
    name: Add ${{ matrix.artifact }} to release
    if: github.repository == 'Eeems/git-remote-rns' && github.event_name == 'release' && startsWith(github.ref, 'refs/tags')
    needs:
      - build-wheel
      - build-sdist
    runs-on: ubuntu-latest
    strategy:
      matrix:
        artifact:
          - "pip-sdist"
          - "pip-wheel-3.11-x86_64-glibc"
          - "pip-wheel-3.12-x86_64-glibc"
          - "pip-wheel-3.13-x86_64-glibc"
          - "pip-wheel-3.14-x86_64-glibc"
          - "pip-wheel-3.11-i686-glibc"
          - "pip-wheel-3.12-i686-glibc"
          - "pip-wheel-3.13-i686-glibc"
          - "pip-wheel-3.14-i686-glibc"
          - "pip-wheel-3.11-ppc64le-glibc"
          - "pip-wheel-3.12-ppc64le-glibc"
          - "pip-wheel-3.13-ppc64le-glibc"
          - "pip-wheel-3.14-ppc64le-glibc"
          - "pip-wheel-3.11-aarch64-glibc"
          - "pip-wheel-3.12-aarch64-glibc"
          - "pip-wheel-3.13-aarch64-glibc"
          - "pip-wheel-3.14-aarch64-glibc"
          - "pip-wheel-3.11-armv7l-glibc"
          - "pip-wheel-3.12-armv7l-glibc"
          - "pip-wheel-3.13-armv7l-glibc"
          - "pip-wheel-3.14-armv7l-glibc"
          - "pip-wheel-3.11-x86_64-musl"
          - "pip-wheel-3.12-x86_64-musl"
          - "pip-wheel-3.13-x86_64-musl"
          - "pip-wheel-3.14-x86_64-musl"
          - "pip-wheel-3.11-i686-musl"
          - "pip-wheel-3.12-i686-musl"
          - "pip-wheel-3.13-i686-musl"
          - "pip-wheel-3.14-i686-musl"
          - "pip-wheel-3.11-ppc64le-musl"
          - "pip-wheel-3.12-ppc64le-musl"
          - "pip-wheel-3.13-ppc64le-musl"
          - "pip-wheel-3.14-ppc64le-musl"
          - "pip-wheel-3.11-aarch64-musl"
          - "pip-wheel-3.12-aarch64-musl"
          - "pip-wheel-3.13-aarch64-musl"
          - "pip-wheel-3.14-aarch64-musl"
          - "pip-wheel-3.11-armv7l-musl"
          - "pip-wheel-3.12-armv7l-musl"
          - "pip-wheel-3.13-armv7l-musl"
          - "pip-wheel-3.14-armv7l-musl"
    permissions:
      contents: write
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - name: Download artifact
        id: download
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: dist
      - name: Upload to release
        run: find . -type f | xargs -rI {} gh release upload "$TAG" {} --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        working-directory: ${{ steps.download.outputs.download-path }}
