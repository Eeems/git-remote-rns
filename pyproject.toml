[project]
name = "git-remote-rns"
version = "0.1.0"
description = "Git remote helper for syncing repositories over Reticulum"
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
authors = [{name = "Eeems"}]
dependencies = ["rns>=1.0"]

[project.optional-dependencies]
dev = ["pytest>=7.0", "prospector[with_everything]"]

[project.scripts]
git-remote-rns = "rnsremote.__main__:client"
rngit = "rnsremote.__main__:server"

[build-system]
requires = ["setuptools>=70.1", "nuitka>=4.0.6"]
build-backend = "nuitka.distutils.Build"

[tool.setuptools]
packages = ["rnsremote"]
